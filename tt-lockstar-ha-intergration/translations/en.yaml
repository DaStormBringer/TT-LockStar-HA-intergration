configuration:
  bluetooth_adapter:
    name: "Bluetooth Adapter"
    description: "The local Bluetooth adapter to use, normally hci0 or hci1."
  bluetooth_transport:
    name: "Bluetooth Transport"
    description: "Use raw_hci for the validated fallback, bluez for native BlueZ D-Bus, esphome_proxy for local ESPHome proxies, or dbus for the older Noble-backed experiment."
  esphome_proxy_hosts:
    name: "ESPHome Bluetooth Proxy Hosts"
    description: "Comma-separated local ESPHome native API endpoints, for example 192.168.1.30:6053,192.168.1.55:6053. Used only by esphome_proxy."
  esphome_advertisement_source:
    name: "ESPHome Advertisement Source"
    description: "Use home_assistant to share Home Assistant's Bluetooth feed (recommended), or direct only for legacy diagnostics that dedicate the proxies to TT LockStar."
  gateway:
    name: "Bluetooth Gateway"
    description: "The Bluetooth gateway mode to use. Select 'none' to use the local Bluetooth adapter."
  gateway_host:
    name: "Remote Gateway Host"
    description: "IP Address or Hostname of the remote Noble gateway (if using Noble)."
  gateway_port:
    name: "Remote Gateway Port"
    description: "Port of the remote Noble gateway."
  gateway_key:
    name: "Remote Gateway Key"
    description: "API Key for the remote Noble gateway."
  gateway_user:
    name: "Remote Gateway Username"
    description: "Username for the remote Noble gateway."
  gateway_pass:
    name: "Remote Gateway Password"
    description: "Password for the remote Noble gateway."
  ignore_crc:
    name: "Ignore CRC Errors"
    description: "Ignore bad CRC in responses from the lock."
  debug_communication:
    name: "Debug Communication"
    description: "Log BLE communication messages to and from the lock."
  debug_mqtt:
    name: "Debug MQTT"
    description: "Log MQTT messages sent and received."
  gateway_debug:
    name: "Debug Gateway"
    description: "Log websocket messages to and from the remote gateway."
